name: Verifier Freshness

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  freshness:
    name: Programs up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the verifier binary and restore/save the Lean cache.
      - uses: leanprover/lean-action@v1
        with:
          lake-package-directory: verifier
          build-args: verifier
          use-mathlib-cache: false

      # Rust toolchain + wasm32 target for cargo build inside verifier check.
      - name: Install Rust wasm32 target
        run: rustup target add wasm32-unknown-unknown

      # wasm-tools is needed by verifier check (strip + print).
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools

      # Regenerate every Program.lean / module.wat without running lake build
      # (proof correctness is covered by the main CI job).
      - name: Regenerate programs
        run: |
          find programs -name "origin.toml" | while read f; do
            dir=$(dirname "$f")
            echo "==> verifier check --no-build $dir"
            lake -d verifier exe verifier check --no-build "$dir"
          done

      # Fail if any generated file changed.
      - name: Assert no drift
        run: |
          git diff --exit-code -- programs/ \
            || { echo ""; echo "Generated files are out of date. Re-run:"; \
                 echo "  lake -d verifier exe verifier check <program-path>"; \
                 exit 1; }
